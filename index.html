<!DOCTYPE html>
<html>
<head>
<title>酷熱指數計算器</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body { margin: 0; font-family: Arial, sans-serif; }

.header {
  background: #1f3a4d;
  color: white;
  padding: 15px 20px;
  display:flex;
  align-items:center;
}

.title { font-size: 20px; font-weight: bold; margin-left:10px; }
.logo { height:40px; }

/* ✅ MENU SYSTEM */
.menu-container {
  position: relative;
  z-index: 3000;
}

.menu-toggle {
  display: none;
  font-size: 26px;
  padding: 10px 15px;
  cursor: pointer;
  background: #2d6c94;
  color: white;
}

.nav {
  background: #2d6c94;
  display: flex;
}

.nav a {
  color: white;
  padding: 12px 15px;
  font-size: 18px;
  text-decoration: none;
  display: block;
}

.nav a:hover { background: #1f4f6d; }

/* ✅ MOBILE FIX */
@media (max-width: 768px) {
  .menu-toggle {
    display: block;
  }

  .nav {
    display: none;
    flex-direction: column;
    width: 100%;
  }

  .nav.active {
    display: flex;
  }
}

.container {
  width: 100%;
  max-width: 400px;
  background: white;
  padding: 20px;
  border-radius: 15px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
  text-align: center;
}

.title-bar {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 10px;
}

input {
  width: 75%;
  padding: 12px;
  margin: 8px auto;
  font-size: 16px;
  border-radius: 8px;
  border: 1px solid #ccc;
  display: block;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  font-size: 16px;
  background-color: #0078d4;
  color: white;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

button:hover {
  background-color: #005fa3;
}

.help-btn {
  width: auto;
  padding: 5px 10px;
  border-radius: 50%;
  background-color: #0078d4;
}

#result {
  margin-top: 15px;
  font-size: 18px;
}

.box {
  padding: 15px;
  margin-top: 15px;
  border-radius: 10px;
  text-align: left;
  font-size: 15px;
}

.yellow { background-color: #fdffcc; color: #8f8a00; }
.orange { background-color: #ffe5cc; color: #cc6600; }
.red { background-color: #ffd6d6; color: #cc0000; }
.purple { background-color: #f0d6ff; color: #800080; }
.safe { background-color: #e6ffe6; color: #006600; }

.faq-box {
  background: #ffffff;
  padding: 15px;
  margin-top: 15px;
  border-radius: 10px;
  text-align: left;
  font-size: 14px;
  max-height: 300px;
  overflow-y: auto;
}

.bottom-img {
  margin-top: 20px;
  width: 60%;
  max-width: 200px;
  display: block;
  margin-left: auto;
  margin-right: auto;
}

.heat-table {
  border-collapse: collapse;
  width: 80%;
  margin: 20px;
  font-size: 16px;
  margin: 20px auto;
}

.heat-table th, .heat-table td {
  border: 1px solid black;
  padding: 10px;
}

.heat-table th {
  background-color: #eeeeee;
  text-align: center;
}
</style>
</head>

<body>

<div class="header">
  <img src="MSSO.png" class="logo">
  <div class="title">澳門民間氣象台 MSSO</div>
</div>

<!-- ✅ MENU -->
  <div class="menu-container">
    <div class="menu-toggle" onclick="toggleMenu()">☰</div>

    <div class="nav" id="navMenu">
      <a href="https://macaosso.github.io/MSSOweb/index.html">首頁</a>
      <a href="https://macaosso.github.io/Apparent_Temperature/">酷熱指數</a>
      <a href="https://macaosso.github.io/MSSOweb/cal_dis.html">熱帶氣旋距離計算工具</a> 
      <a href="https://macaosso.github.io/MSSOweb/tc_gis.html">熱帶氣旋路徑地圖</a>  
      <a href="https://macaosso.github.io/MSSOweb/tc.html">熱帶氣旋資訊</a>
      <a href="https://macaosso.github.io/MSSOweb/about.html">關於我們</a>
    </div>
  </div>
</div>

<div class="container">

  <div class="title-bar">
    <h2>酷熱指數計算器</h2>
    <button class="help-btn" onclick="toggleFAQ()">❓</button>
  </div>

  <div id="faq" class="faq-box" style="display:none;">
    <h3>常見問題</h3>
    <p><b>什麼是酷熱指數?</b><br>
    酷熱指數是綜合氣溫與濕度的體感熱指標。</p>
  </div>

  <input type="number" id="temp" placeholder="氣溫 (°C)">
  <input type="number" id="humidity" placeholder="相對濕度 (%)">

  <button onclick="calculate()">計算</button>

  <div id="result"></div>

  <img src="MSSO (1).png" class="bottom-img">

</div>

<div id="result"></div>

<!-- ✅ ADD TABLE HERE -->
<table class="heat-table">
  <tr>
    <th>酷熱指數</th>
    <th>分類</th>
  </tr>

  <tr class="purple">
    <td>>=54.5</td>
    <td>極度危險</td>
  </tr>

  <tr class="red">
    <td>45.5 - 54.4</td>
    <td>危險</td>
  </tr>

  <tr class="orange">
    <td>39.5 - 45.4</td>
    <td>特別注意</td>
  </tr>

  <tr class="yellow">
    <td>35.5 - 39.4</td>
    <td>注意</td>
  </tr>

  <tr class="safe">
    <td><35.5</td>
    <td>正常</td>
  </tr>
</table>
``

<script>

/* ✅ MENU */
function toggleMenu() {
  const nav = document.getElementById("navMenu");
  const btn = document.querySelector(".menu-toggle");

  nav.classList.toggle("active");
  btn.innerHTML = nav.classList.contains("active") ? "✕" : "☰";
}

/* FAQ */
function toggleFAQ() {
  let faq = document.getElementById("faq");
  faq.style.display = (faq.style.display === "none") ? "block" : "none";
}

/* CALC */
function calculate() {
  let T = parseFloat(document.getElementById("temp").value);
  let RH = parseFloat(document.getElementById("humidity").value);

  if (isNaN(T) || isNaN(RH)) {
    document.getElementById("result").innerHTML = "請輸入有效的數字";
    return;
  }

  let AT = -8.784695 +
           1.61139411 * T +
           2.338549 * RH -
           0.14611605 * T * RH -
           0.012308094 * T * T -
           0.016424828 * RH * RH +
           0.002211732 * T * T * RH +
           0.00072546 * T * RH * RH -
           0.000003582 * T * T * RH * RH;

  let warningBox = "";

  if (AT >= 35.5 && AT <= 39.4999) {
    warningBox = `<div class="box yellow">🟡 注意<br><br>長時間暴露在陽光下或進行體力活動可能會導致疲勞。請補充足夠水分，並在陰涼處休息。</div>`;
  } 
  else if (AT >= 39.5 && AT <= 45.4999) {
    warningBox = `<div class="box orange">🟠 特別注意<br><br>長時間暴露在陽光下或進行體力活動可能導致中暑、肌肉抽筋和熱衰竭。建議市民減少戶外劇烈活動、穿著輕便及淺色的衣物、補充足夠水分。</div>`;
  } 
  else if (AT >= 45.5 && AT <= 54.4999) {
    warningBox = `<div class="box red">🔴 危險<br><br>極可能發生中暑、熱痙攣和熱衰竭。長時間暴露在陽光下或進行體力活動有可能發生嚴重中暑。建議市民避免戶外劇烈活動、穿著輕便及淺色的衣物、補充足夠水分，特別關注易受影響的族群。</div>`;
  } 
  else if (AT >= 54.5) {
    warningBox = `<div class="box purple">🟣 極度危險<br><br>極可能發生嚴重中暑（熱射病）。這是威脅生命的情況。建議市民避免所有戶外活動及補充足夠水分，並尋找有空調的庇護所，若出現症狀請撥打急救電話。</div>`;
  } 
  else {
    warningBox = `<div class="box safe">✅ 正常</div>`;
  }

  document.getElementById("result").innerHTML =
    `<b>酷熱指數: ${AT.toFixed(2)} °C</b>` + warningBox;
}


</script>

</body>
</html>
