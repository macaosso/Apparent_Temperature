<!DOCTYPE html>
<html>
<head>
    <title>體感溫度計算器</title>

    <style>
        body {
            font-family: Arial;
            text-align: center;
            margin-top: 50px;
            background-color: #f5f5f5;
        }

        input {
            padding: 8px;
            margin: 5px;
            width: 150px;
        }

        button {
            padding: 10px 20px;
            margin-top: 10px;
            cursor: pointer;
        }

        #result {
            margin-top: 20px;
            font-size: 18px;
        }

        .box {
            padding: 15px;
            margin: 20px auto;
            border-radius: 10px;
            width: 60%;
            text-align: left;
        }

        .orange { background-color: #ffe5cc; color: #cc6600; }
        .red { background-color: #ffd6d6; color: #cc0000; }
        .purple { background-color: #f0d6ff; color: #800080; }
        .safe { background-color: #e6ffe6; color: #006600; }
    </style>
</head>

<body>

<h2>體感溫度計算器</h2>

<div>
    <input type="number" id="temp" placeholder="氣溫 (°C)">
    <br>
    <input type="number" id="humidity" placeholder="相對濕度 (%)">
    <br>
    <button onclick="calculate()">計算</button>
</div>

<div id="result"></div>

<script>
function calculate() {
    let T = parseFloat(document.getElementById("temp").value);
    let RH = parseFloat(document.getElementById("humidity").value);

    if (isNaN(T) || isNaN(RH)) {
        document.getElementById("result").innerHTML = "請輸入有效的數字";
        return;
    }

    let AT = -8.784695 +
             1.61139411 * T +
             2.338549 * RH +
            -0.14611605 * T * RH +
            -0.012308094 * T * T +
            -0.016424828 * RH * RH +
             0.002211732 * T * T * RH +
             0.00072546 * T * RH * RH +
            -0.000003582 * T * T * RH * RH;

    let warningBox = "";

    if (AT >= 38 && AT <= 39) {
        warningBox = `
        <div class="box orange">
            🟠 特別注意<br><br>
            長時間暴露在陽光下或進行體力活動可能導致中暑。
        </div>`;
    }
    else if (AT >= 40 && AT <= 47) {
        warningBox = `
        <div class="box red">
            🔴 危險<br><br>
            極可能發生中暑或熱衰竭。
        </div>`;
    }
    else if (AT >= 48) {
        warningBox = `
        <div class="box purple">
            🟣 極度危險<br><br>
            可能發生熱射病，屬於生命危險。
        </div>`;
    }
    else {
        warningBox = `
        <div class="box safe">
            ✅ 正常。
        </div>`;
    }

    document.getElementById("result").innerHTML =
        `<b>體感溫度: ${AT.toFixed(2)} °C</b>` + warningBox;
}
</script>

</body>
</html>
