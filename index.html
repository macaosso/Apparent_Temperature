<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>酷熱/體感/露點溫度計算器 | MSSO澳門民間氣象台</title>
<link rel="icon" type="image/png" href="MSSO (2).png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"Noto Sans TC",Arial,sans-serif;}
body{background:#ffffff; padding:20px;}

/* Fix full width header stick page margin */
.header {
  background: #1f3a4d;
  color: white;
  padding: 25px 20px;
  display:flex;
  align-items:center;
  margin:-20 -20px;
}
.title { font-size: 20px; font-weight: bold; margin-left:10px; }
.logo { height:40px; }

.menu-container {
  position: relative;
  z-index: 3000;
  margin:-20 -20px;
}
.menu-toggle {
  display: none;
  font-size: 26px;
  padding: 10px 15px;
  cursor: pointer;
  background: #2d6c94;
  color: white;
}
.nav {
  background: #2d6c94;
  display: flex;
}
.nav a {
  color: white;
  padding: 25px 20px;
  font-size: 18px;
  text-decoration: none;
  display: block;
}
.nav a:hover { background: #1f4f6d; }

@media (max-width: 768px) {
  .menu-toggle {display:block;}
  .nav {display: none;flex-direction: column;width:100%;}
  .nav.active {display:flex;}
  .nav a{padding:12px 15px;}
}

/* Top input single card */
.input-card{
  max-width:620px;
  margin:30px auto;
  background:#fff;
  padding:24px;
  border:2px solid #4fa6a6;
  border-radius:12px;
}
.title-bar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
}
.card-title{
  font-size:22px;
  font-weight:bold;
  color:#1f3a4d;
}
.help-btn{
  width:34px;height:34px;
  border-radius:50%;
  background:#4fa6a6;
  color:#fff;
  border:none;
  font-size:16px;
  cursor:pointer;
}
#faq{
  background:#e6f7f7;
  padding:16px;
  border-radius:9px;
  margin-bottom:20px;
  font-size:15px;
  display:none;
}

input{
  width:100%;
  padding:13px 14px;
  margin-bottom:14px;
  border:1px solid #b8d8d8;
  border-radius:8px;
  font-size:16px;
}
input:focus{
  outline:none;
  border-color:#4fa6a6;
}

.btn-row{
  display:grid;
  grid-template-columns:2fr 1fr;
  gap:12px;
  margin:10px 0 20px;
}
.calc-btn{
  padding:13px;
  border:none;
  border-radius:9px;
  font-size:16px;
  font-weight:bold;
  background:#4fa6a6;
  color:#fff;
  cursor:pointer;
}
.clear-btn{
  padding:13px;
  border:none;
  border-radius:9px;
  font-size:16px;
  background:#cccccc;
  color:#333;
  cursor:pointer;
}

.bottom-img{
  width:60%;
  max-width:180px;
  display:block;
  margin:24px auto 0;
}

/* Three separate independent result boxes container: Desktop 3 column, mobile 1 column */
.result-container{
  max-width:1150px;
  margin:0 auto 25px;
  display:grid;
  grid-template-columns: repeat(3, 1fr);
  gap:18px;
}
@media(max-width:720px){
  .result-container{grid-template-columns:1fr;}
}
/* every result is fully standalone separate box */
.result-block{
  background:#f4fafa;
  border:2px solid #4fa6a6;
  border-radius:11px;
  padding:20px;
}
.res-heading{
  font-size:17px;
  color:#1f3a4d;
  font-weight:bold;
  margin-bottom:9px;
}
.res-data{
  font-size:22px;
}

/* Warning box */
.warn-box{
  max-width:620px;
  margin:0 auto 30px;
  padding:15px;
  border-radius:9px;
  line-height:1.6;
}
.yellow { background-color: #fdffcc; color: #8f8a00; }
.orange { background-color: #ffe5cc; color: #cc6600; }
.red { background-color: #ffd6d6; color: #cc0000; }
.purple { background-color: #f0d6ff; color: #800080; }
.safe { background-color: #e6ffe6; color: #006600; }

/* Heat index table */
.table-card{
  max-width:540px;
  margin:0 auto 30px;
  padding:22px;
  border:2px solid #4fa6a6;
  border-radius:14px;
}
.heat-table{
  width:100%;
  border-collapse:collapse;
  font-size:16px;
}
.heat-table th,.heat-table td{
  border:1px solid #999;
  padding:12px;
  text-align:center;
}
.heat-table th{background:#e6f7f7;color:#1f3a4d;}
</style>
</head>

<body>
<div class="header">
  <img src="MSSO (2).png" class="logo">
  <div class="title">澳門民間氣象台 MSSO</div>
</div>

<div class="menu-container">
  <div class="menu-toggle" onclick="toggleMenu()">☰</div>
  <div class="nav" id="navMenu">
    <a href="https://macaosso.github.io/MSSOweb/index.html">首頁</a>
    <a href="https://macaosso.github.io/Apparent_Temperature/">酷熱指數</a>
    <a href="https://macaosso.github.io/MSSOweb/cal_dis.html">熱帶氣旋距離計算工具</a>
    <a href="https://macaosso.github.io/MSSOweb/tc_gis.html">熱帶氣旋路徑地圖</a>
    <a href="https://macaosso.github.io/MSSOweb/tc.html">熱帶氣旋資訊</a>
    <a href="https://macaosso.github.io/MSSOweb/about.html">關於我們</a>
    <a href="https://macaosso.github.io/MSSOweb/ver.html">版本記錄</a>
  </div>
</div>

<!-- Input Area -->
<div class="input-card">
  <div class="title-bar">
    <div class="card-title">酷熱/體感/露點溫度計算器</div>
    <button class="help-btn" onclick="toggleFAQ()">❓</button>
  </div>
  <div id="faq">
    <h3>參數說明</h3>
    <p><b>酷熱指數：</b>NOAA標準多項式公式<br>
    <b>體感溫度：</b>AT=1.04T+0.2e−0.65V−2.7，V=風速km/h<br>
    <b>露點溫度：</b>Tetens氣象標準公式</p>
  </div>

  <input type="number" id="temp" placeholder="氣溫 (°C)">
  <input type="number" id="humidity" placeholder="相對濕度 (%)">
  <input type="number" id="wind" placeholder="風速 (km/h)｜留空預設=0">

  <div class="btn-row">
    <button class="calc-btn" onclick="calculate()">一鍵計算三項數值</button>
    <button class="clear-btn" onclick="clearAll()">清空</button>
  </div>

  <img src="MSSO (1).png" class="bottom-img">
</div>

<!-- Three FULLY SEPARATE INDEPENDENT BOXES -->
<div class="result-container" id="resultContainer"></div>

<!-- Warning Message Area -->
<div id="warningContainer"></div>

<!-- Heat Index Level Table -->
<div class="table-card">
  <table class="heat-table">
    <tr>
      <th>酷熱指數(°C)</th>
      <th>風險分類</th>
    </tr>
    <tr class="purple">
      <td>≥54.5</td>
      <td>極度危險</td>
    </tr>
    <tr class="red">
      <td>45.5 ~ 54.4</td>
      <td>危險</td>
    </tr>
    <tr class="orange">
      <td>39.5 ~ 45.4</td>
      <td>特別注意</td>
    </tr>
    <tr class="yellow">
      <td>35.5 ~ 39.4</td>
      <td>注意</td>
    </tr>
    <tr class="safe">
      <td>＜35.5</td>
      <td>正常</td>
    </tr>
  </table>
</div>

<script>
function toggleMenu() {
  const nav = document.getElementById("navMenu");
  const btn = document.querySelector(".menu-toggle");
  nav.classList.toggle("active");
  btn.innerHTML = nav.classList.contains("active") ? "✕" : "☰";
}
function toggleFAQ() {
  const faq = document.getElementById("faq");
  faq.style.display = faq.style.display === "none" ? "block" : "none";
}
function clearAll(){
  document.getElementById("temp").value = "";
  document.getElementById("humidity").value = "";
  document.getElementById("wind").value = "";
  document.getElementById("resultContainer").innerHTML = "";
  document.getElementById("warningContainer").innerHTML = "";
}

function calculate() {
  let T = parseFloat(document.getElementById("temp").value);
  let RH = parseFloat(document.getElementById("humidity").value);
  let V = parseFloat(document.getElementById("wind").value ?? 0);
  if(isNaN(V)) V = 0;

  const resWrap = document.getElementById("resultContainer");
  const warnWrap = document.getElementById("warningContainer");
  resWrap.innerHTML = "";
  warnWrap.innerHTML = "";

  if (isNaN(T) || isNaN(RH) || RH < 0 || RH > 100) {
    warnWrap.innerHTML = `<div class="warn-box red">請輸入合法數值：濕度範圍0~100%</div>`;
    return;
  }

  // NOAA Heat Index
  let HI = -8.784695 + 1.61139411*T + 2.338549*RH - 0.14611605*T*RH - 0.012308094*T*T - 0.016424828*RH*RH + 0.002211732*T*T*RH + 0.00072546*T*RH*RH - 0.000003582*T*T*RH*RH;
  // Vapor pressure
  let e = (RH/100)*6.105*Math.exp((17.27*T)/(237.7+T));
  // Apparent Temperature
  let AT = 1.04*T + 0.2*e - 0.65*V - 2.7;
  // Dew Point Tetens
  const a=17.27,b=237.7;
  let gamma = (a*T)/(b+T)+Math.log(RH/100);
  let TD = (b*gamma)/(a-gamma);

  // Render three fully separate standalone boxes
  resWrap.innerHTML = `
    <div class="result-block">
      <div class="res-heading">🔥 酷熱指數</div>
      <div class="res-data">${HI.toFixed(2)} ℃</div>
    </div>
    <div class="result-block">
      <div class="res-heading">🌬️ 體感溫度(V=${V}km/h)</div>
      <div class="res-data">${AT.toFixed(2)} ℃</div>
    </div>
    <div class="result-block">
      <div class="res-heading">💧 露點溫度</div>
      <div class="res-data">${TD.toFixed(2)} ℃</div>
    </div>
  `;

  // Warning text
  let warnText = "";
  if(HI >=54.5) warnText = `<div class="warn-box purple">🟣 極度危險｜極易引發熱射病，避免外出</div>`;
  else if(HI >=45.5) warnText = `<div class="warn-box red">🔴 危險｜容易中暑、熱衰竭，減少戶外活動</div>`;
  else if(HI >=39.5) warnText = `<div class="warn-box orange">🟠 特別注意｜高溫悶熱，適時補充水分</div>`;
  else if(HI >=35.5) warnText = `<div class="warn-box yellow">🟡 注意｜長時間活動容易疲勞</div>`;
  else warnText = `<div class="warn-box safe">✅ 環境溫濕度正常，體感舒適</div>`;
  warnWrap.innerHTML = warnText;
}
</script>
</body>
</html>
