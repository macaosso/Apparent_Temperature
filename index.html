        body { margin: 0; font-family: Arial, sans-serif; }

        /* ✅ SHORTER input boxes */

<body>
<div class="header">
  <img src="icons/MSSO.png" class="logo">
  <div class="title">澳門民間氣象台 MSSO</div>
</div>

<div class="nav">
  <a href="https://macaosso.github.io/MSSOweb/index.html">首頁</a>

  <a href="https://macaosso.github.io/MSSOweb/about.html">關於我們</a>
</div>
    
<div class="container">

    <div class="title-bar">
        <h2>酷熱指數計算器</h2>
        <button class="help-btn" onclick="toggleFAQ()">❓</button>
    </div>

    <div id="faq" class="faq-box" style="display:none;">

        <h3>常見問題</h3>

        <p><b>什麼是體感溫度？</b><br>
        酷熱指數（英語：Heat Index）是一種綜合空氣溫度和相對濕度的熱指標。 人體通過排出汗液來達到降溫的目的，在這個過程里，汗液中的水分蒸發並且從人體帶走熱量，但是當相對濕度較高時，水分的蒸發率就會降低。 這意味著從身體中帶走熱量的過程變得緩慢，相對處於乾燥空氣中的情況，人體內會自動排汗並帶走身上的熱量。</p>

    </div>

    <input type="number" id="temp" placeholder="氣溫 (°C)">
    <input type="number" id="humidity" placeholder="相對濕度 (%)">

    <button onclick="calculate()">計算</button>

    <div id="result"></div>

    <!-- ✅ IMAGE -->
    <img src="MSSO (1).png" class="bottom-img">

</div>

<script>
function toggleFAQ() {
    let faq = document.getElementById("faq");
    faq.style.display = (faq.style.display === "none") ? "block" : "none";
}

function calculate() {
    let T = parseFloat(document.getElementById("temp").value);
    let RH = parseFloat(document.getElementById("humidity").value);

    if (isNaN(T) || isNaN(RH)) {
        document.getElementById("result").innerHTML = "請輸入有效的數字";
        return;
    }

    let AT = -8.784695 +
             1.61139411 * T +
             2.338549 * RH +
            -0.14611605 * T * RH +
            -0.012308094 * T * T +
            -0.016424828 * RH * RH +
             0.002211732 * T * T * RH +
             0.00072546 * T * RH * RH +
            -0.000003582 * T * T * RH * RH;

    let warningBox = "";
    if (AT >= 35.5 && AT <= 39.4999) {warningBox = `<div class="box yellow">🟡 注意<br><br>長時間暴露在陽光下或進行體力活動可能會導致疲勞。請保持水分補充，並在陰涼處休息。</div>`;}    
    else if (AT >= 39.5 && AT <= 45.4999) {warningBox = `<div class="box orange">🟠 特別注意<br><br>長時間暴露在陽光下或進行體力活動可能導致中暑、肌肉抽筋和熱衰竭。建議市民減少戶外劇烈活動、穿著輕便及淺色的衣物、補充足夠水分。</div>`;}
    else if (AT >= 45.5 && AT <= 54.4999) {warningBox = `<div class="box red">🔴 危險<br><br>極可能發生中暑、熱痙攣和熱衰竭。長時間暴露在陽光下或進行體力活動有可能發生嚴重中暑。建議市民避免戶外劇烈活動、穿著輕便及淺色的衣物、補充足夠水分，特別關注易受影響的族群。</div>`;}
    else if (AT >= 54.5) {warningBox = `<div class="box purple">🟣 極度危險<br><br>極可能發生嚴重中暑（熱射病）。這是威脅生命的情況。建議市民避免所有戶外活動及補充足夠水分，並尋找有空調的庇護所，若出現症狀請撥打急救電話。</div>`;}
    else {warningBox = `<div class="box safe">正常</div>`;}

    document.getElementById("result").innerHTML =
        `<b>體感溫度: ${AT.toFixed(2)} °C</b>` + warningBox;
}
</script>

</body>
</html>
